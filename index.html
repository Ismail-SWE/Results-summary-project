<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Results summary component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <main>
    <section class="left-side">
      <h3>Your Result</h3>
      <div class="score-circle">
        <h1>76</h1>
        <p>of 100</p>
      </div>
      <h2>Great</h2>
      <p>You scored higher than 65% of the people who have taken these tests.</p>
    </section>
    <section class="right-side">
      <h3>Summary</h3>
      <div class="item reaction">
        <div class="item-left">
         <img src="assets/images/icon-reaction.svg" alt="reaction-icon">
         <span class="reaction-item">Reaction</span>
        </div>
        <span><strong>80</strong>/100</span>
      </div>
      <div class="item memory">
        <div class="item-left">
        <img src="assets/images/icon-memory.svg" alt="memory-icon">
        <span class="memory-item">Memory</span>
        </div>
        <span><strong>92</strong>/100</span>
      </div>
      <div class="item verbal">
        <div class="item-left">
        <img src="assets/images/icon-verbal.svg" alt="verbal-icon">
        <span class="verbal-icon">Verbal</span>
        </div>
        <span><strong>61</strong>/100</span>
      </div>
      <div class="item visual">
        <div class="item-left">
        <img src="assets/images/icon-visual.svg" alt="visual-icon">
        <span class="visual-icon">Visual</span>
        </div>
        <span><strong>73</strong>/100</span>
      </div>
      <button>Continue</button>
    </section>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Ismailov K</a>.
  </footer>
</body>
</html>
